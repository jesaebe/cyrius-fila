services:
  db:
    image: postgres:14
    container_name: fila_db
    restart: always
    environment:
      POSTGRES_DB: fila_db
      POSTGRES_USER: fila_user
      POSTGRES_PASSWORD: fila_password
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: fila_backend
    restart: always
    env_file:
      - ./backend/.env
    depends_on:
      - db
    ports:
      - "8010:8000"

  frontend:
    build: ./frontend
    container_name: fila_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5174:5173"
    command: npm run dev -- --host
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data:
